<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <h1>My Library</h1>

    <button id="add-btn" command="show-modal" commandfor="add-dialog">Add New Book</button>

    <dialog id="add-dialog">
        <form action="" method="post">
            <div>
                <label for="book-title">*Title:</label>
                <input type="text" id="book-title" name="title">
            </div>

            <div>
                <label for="book-author">*Author:</label>
                <input type="text" id="book-author" name="author">
            </div>

            <div>
                <label for="book-pages">*Pages:</label>
                <input type="number" id="book-pages" name="pages">
            </div>

            <fieldset>
                <legend>Have you read it?</legend>

                <div>
                    <label for="book-read">Read</label>
                    <input type="radio" id="book-read" name="status" value="Read">
                </div>

                <div>
                    <label for="book-unread">Unread</label>
                    <input type="radio" id="book-unread" name="status" value="Unread">
                </div>
            </fieldset>

            <div>
                <button type="button" id="cancel-btn">Cancel</button>
                <button id="submit-btn">Submit</button>
            </div>
        </form>
    </dialog>

    <table>
        <caption>My books</caption>
        <thead>
            <tr>
                <th scope="col">Title</th>
                <th scope="col">Author</th>
                <th scope="col">Pages</th>
                <th scope="col">Status</th>
                <th scope="col"></th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</body>
</html>
